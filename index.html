<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>One Part Analog</title>
  <meta
    name="description"
    content="One Part Analog is a collection of pursuits, experiments, and revisions built around reducing noise and unnecessary friction."
  />

  <style>
    :root {
      --bg: #050706;
      --bg-soft: #090c0b;
      --text: #e4e0d6;
      --text-muted: #8a8f8a;
      --text-dim: #5f6763;
      --gold: #c08a2e;
      --gold-soft: #d2a34f;
      --line: rgba(228, 224, 214, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "SF Pro Display",
        "SF Pro Text",
        system-ui,
        sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 12%, rgba(192, 138, 46, 0.045), transparent 32%),
        radial-gradient(circle at 50% 78%, rgba(228, 224, 214, 0.035), transparent 34%),
        linear-gradient(180deg, #070908 0%, #050706 100%);
    }

    .page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 30px 18px;
    }

    .note {
      width: min(100%, 420px);
      min-height: calc(100vh - 60px);
      border: 1px solid var(--line);
      border-radius: 10px;
      background:
        linear-gradient(180deg, rgba(10, 13, 12, 0.96), rgba(5, 7, 6, 0.98));
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 70px 30px 58px;
    }

    .brand {
      margin: 0;
      font-size: 23px;
      line-height: 1.1;
      font-weight: 650;
      letter-spacing: 0.015em;
      color: var(--text);
    }

    .intro {
      margin-top: 78px;
    }

    .signal {
      margin: 0;
      color: var(--text);
      font-size: 17px;
      line-height: 1.55;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .senses {
      margin-top: 34px;
      color: var(--text-muted);
      font-size: 10px;
      line-height: 1.8;
      font-weight: 650;
      letter-spacing: 0.34em;
      text-transform: uppercase;
    }

    .words {
      margin-top: 82px;
      color: var(--text);
      font-size: 22px;
      line-height: 1.45;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .belief {
      margin-top: 82px;
      max-width: 320px;
    }

    .setup {
      margin: 0;
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.55;
      font-style: italic;
      letter-spacing: 0.01em;
    }

    .statement {
      margin: 30px 0 0;
      color: var(--text);
      font-size: 18px;
      line-height: 1.42;
      font-weight: 520;
      letter-spacing: -0.015em;
    }

    .closing {
      margin-top: auto;
      padding-top: 96px;
      color: var(--gold-soft);
    }

    .opa {
      margin: 0;
      color: var(--gold-soft);
      font-size: 12px;
      line-height: 1;
      font-weight: 750;
      letter-spacing: 0.22em;
    }

    .soon {
      margin: 10px 0 0;
      color: var(--text-dim);
      font-size: 10px;
      line-height: 1;
      font-weight: 650;
      letter-spacing: 0.42em;
      text-transform: uppercase;
    }

    @media (max-width: 390px) {
      .page {
        padding: 0;
      }

      .note {
        width: 100%;
        min-height: 100vh;
        border: 0;
        border-radius: 0;
        padding: 70px 28px 54px;
      }

      .intro {
        margin-top: 76px;
      }

      .words {
        margin-top: 80px;
      }

      .belief {
        margin-top: 80px;
      }
    }

    @media (max-width: 340px) {
      .note {
        padding-inline: 24px;
      }

      .brand {
        font-size: 21px;
      }

      .signal {
        font-size: 16px;
      }

      .statement {
        font-size: 17px;
      }

      .senses {
        font-size: 9px;
        letter-spacing: 0.3em;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="note" aria-label="One Part Analog">
      <h1 class="brand">One Part Analog</h1>

      <div class="intro">
        <p class="signal">We live through signal.</p>

        <div class="senses">
          Light. Sound. Touch. Motion. Presence.
        </div>
      </div>

      <div class="words">
        Cleaner.<br />
        Quieter.
      </div>

      <div class="belief">
        <p class="setup">
          A collection of pursuits, experiments, and revisions built around one belief:
        </p>

        <p class="statement">
          Engaging moments happen more often when noise and unnecessary friction are removed.
        </p>
      </div>

      <footer class="closing">
        <p class="opa">OPA:</p>
        <p class="soon">More soon.</p>
      </footer>
    </section>
  </main>
</body>
</html>
